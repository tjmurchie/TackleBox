# TackleBox: Spinner reference database profile
#
# Full-stack curation for building a custom reference database for read mapping
# or metabarcoding taxonomy assignment.
#
# Pipeline: basic QC → adapter/keyword screen → taxonomy check (MMSeqs2 vs NR,
#           translated search) → vsearch uchime (short amplicons) → clustering
#           → capping
#
# Taxonomy method: MMSeqs2 easy-search, search-type 3 (translated nuc→protein)
#   against NCBI NR.  100-1000x faster than blastn vs NT; sufficient for
#   cross-kingdom contamination detection.  Sequences with no NR hit are flagged
#   for REVIEW (not rejected) — appropriate for rare/extinct taxa absent from NR.
#
# Windowed BLAST: disabled.  NCBI-sourced reference sequences are not PCR
#   chimeras.  Short-amplicon chimeras are caught by chimera_screen (uchime_denovo).
#   Re-enable only if auditing user-assembled long sequences of uncertain origin.
#
# SETUP: Copy this file to spinner_reference_db.yml and fill in the paths below.
#   Required databases:
#     1. MMSeqs2 NR — download and index with:
#          mmseqs databases NR <outdir>/NR tmp
#          mmseqs createtaxdb <outdir>/NR tmp
#        OR download pre-built from the MMSeqs2 database server.
#     2. NCBI taxdump — download from:
#          https://ftp.ncbi.nlm.nih.gov/pub/taxonomy/taxdump.tar.gz
#        and extract nodes.dmp + names.dmp into a local directory.
#
# Usage:
#   ./Spinner filter \
#     --fasta your_refs.fasta \
#     --species-kingdom your_species_kingdom.tsv \
#     --mode reference_db \
#     --outprefix /path/to/output/run_name

run:
  profile_name: reference_db

steps:
  basic_qc: true
  classify_regions: true
  bad_keyword_screen: true
  adapter_screen: true
  vector_screen: false          # enable if UniVec DB available
  taxonomy_blast: true
  windowed_blast: false         # disabled — NCBI refs are not chimeras; uchime handles amplicons
  chimera_screen: true          # vsearch uchime — catches PCR chimeras in short amplicons
  cluster: true
  cap_references: true
  report: true

basic_qc:
  min_length: 50
  max_length: 400000
  max_n_fraction: 0.05          # moderate — rare taxa with partial assemblies still useful
  max_non_iupac_fraction: 0.01
  min_shannon_entropy: 1.2
  max_homopolymer_run: 60
  remove_exact_duplicate_sequences: true
  remove_duplicate_accessions: true

taxonomy_blast:
  method: mmseqs2
  blast_db: /path/to/mmseqs2/Swiss-Prot/Swiss-Prot  # <-- MMSeqs2 Swiss-Prot (recommended) or NR
  search_type: 2                # translated nuc→protein (blastx-equivalent); Swiss-Prot/NR are protein
  num_threads: 8
  max_target_seqs: 5
  evalue: "1e-5"                # slightly relaxed vs blastn to catch distant cross-kingdom hits
  min_qcov: 50.0                # applied after alnlen×3 AA→nt conversion (code handles this)
  min_pident: 30.0              # AA percent identity; 30% reliably separates kingdoms
  expected_taxon_level: genus
  reject_cross_kingdom: true
  review_if_no_expected_match: true   # flag taxa missing from NR — may be legitimate rarities
  taxdump_dir: /path/to/ncbi/taxonomy  # <-- set to directory containing nodes.dmp + names.dmp

chimera_screen:
  method: uchime_denovo         # no reference DB needed; works on short amplicons
  reject_chimeras: true
  review_borderline: true

cluster:
  method: vsearch
  identity: 0.99                # collapse near-identical haplotypes; retain one representative
  by: [species_guess, marker_class]
  max_reps_per_cluster: 1

capping:
  mode: species_marker
  max_per_species_marker:
    Mito: 20
    Plastid: 20
    NucMark: 10
    Other: 5
  max_per_species_total: 50
  cap_action: review
  rescue_sole_representatives: true   # promote best REVIEW if species has 0 KEEP records
